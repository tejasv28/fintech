version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: finshield_db
      POSTGRES_USER: finshield_user
      POSTGRES_PASSWORD: finshield_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finshield_db
      SPRING_DATASOURCE_USERNAME: finshield_user
      SPRING_DATASOURCE_PASSWORD: finshield_pass

      JWT_SECRET: finshield-super-secret-jwt-key-2024
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
